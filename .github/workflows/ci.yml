name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost/ci_db
      DIRECT_URL: postgresql://localhost/ci_db
      BETTER_AUTH_SECRET: ci-build-secret-ci-build-secret
      BETTER_AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      FACEBOOK_CLIENT_ID: ci-facebook-client-id
      FACEBOOK_CLIENT_SECRET: ci-facebook-client-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_GA_MEASUREMENT_ID: G-CITEST123
      NEXT_PUBLIC_PRIVACY_POLICY_URL: http://localhost/privacy

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설정
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 린트 검사
        run: pnpm lint

      - name: 프로젝트 빌드
        run: pnpm build

      - name: 테스트 및 커버리지
        run: pnpm test --coverage

  helm-chart:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Helm 설정
        uses: azure/setup-helm@v4

      - name: Helm 차트 검증
        run: sh scripts/validate-vridge-chart.sh
