name: CI

on:
  pull_request:
    branches:
      - production
      - dev

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost/ci_db
      DIRECT_URL: postgresql://localhost/ci_db
      BETTER_AUTH_SECRET: ci-build-secret-ci-build-secret
      BETTER_AUTH_URL: http://localhost:3000
      # 소셜 로그인 미사용 (Google, Facebook)
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 이미지 빌드 워크플로우 검증
        run: sh scripts/validate-build-image-workflow.sh

      - name: Docker hub 로그인
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: pnpm 설정
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.28.2

      - name: Node.js 설정
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 린트 검사
        run: pnpm lint

      - name: 프로젝트 빌드
        run: pnpm build

      - name: 컨테이너 이미지 빌드
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL}" \
            -t vridge:ci .

      - name: 테스트 및 커버리지
        run: pnpm test --coverage

  helm-chart:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Helm 설정
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2

      - name: Helm 차트 검증
        run: sh scripts/validate-vridge-chart.sh

  k8s-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: uv 설정
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: 매니페스트 검증
        run: sh scripts/validate-k8s-manifests.sh

  cd-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: CD 배포 워크플로우 검증
        run: bash scripts/validate-cd-deploy-workflow.sh
