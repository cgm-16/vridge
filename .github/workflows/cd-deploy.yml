name: CD Deploy

on:
  workflow_run:
    workflows: ['Build Image']
    types: [completed]
    branches: [production]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '배포할 이미지 태그 (기본값: production)'
        required: false
        default: 'production'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: k3s에 배포
    runs-on: [self-hosted, k3s]
    if: >-
      github.event.workflow_run.conclusion == 'success' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/production')
    permissions:
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Helm 설정
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2

      - name: 이미지 태그 결정
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.image_tag }}"
            if echo "$RAW_TAG" | grep -qE '^[A-Za-z0-9._-]+$'; then
              echo "value=$RAW_TAG" >> "$GITHUB_OUTPUT"
            else
              echo "value=production" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 차트 린트
        run: helm lint deploy/helm/vridge

      - name: 차트 렌더링 검증
        run: helm template vridge deploy/helm/vridge --namespace vridge > /dev/null

      - name: 배포
        env:
          KUBECONFIG: /home/ori/.kube/config
        run: |
          helm upgrade vridge deploy/helm/vridge \
            --install \
            --namespace vridge \
            --set-string "image.tag=${{ steps.tag.outputs.value }}" \
            --wait \
            --atomic \
            --timeout 5m
