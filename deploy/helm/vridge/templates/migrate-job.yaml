{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vridge.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vridge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "-5"
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "vridge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - ./node_modules/prisma/bin/prisma.js
            - migrate
            - deploy
            - --schema=./backend/prisma/schema.prisma
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: HOME
              value: /tmp
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.db.name }}
                  key: uri
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.db.name }}
                  key: uri
{{- end }}
