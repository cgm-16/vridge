apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vridge.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "vridge.name" . }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.db.name }}
                  key: uri
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.db.name }}
                  key: uri
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.app.name }}
                  key: BETTER_AUTH_SECRET
            - name: BETTER_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.app.name }}
                  key: BETTER_AUTH_URL
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- include "vridge.probe" (dict "probeName" "startupProbe" "probeValues" .Values.probes.startup) | nindent 10 }}
          {{- include "vridge.probe" (dict "probeName" "livenessProbe" "probeValues" .Values.probes.liveness) | nindent 10 }}
          {{- include "vridge.probe" (dict "probeName" "readinessProbe" "probeValues" .Values.probes.readiness) | nindent 10 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
