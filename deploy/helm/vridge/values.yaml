nameOverride: ''
fullnameOverride: ''

replicaCount: 1

image:
  repository: ghcr.io/cgm-16/vridge
  tag: ''
  pullPolicy: IfNotPresent

imagePullSecrets: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http
  hosts:
    - host: vridge.xyz
      paths:
        - path: /
          pathType: Prefix
    - host: www.vridge.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - vridge.xyz
        - www.vridge.xyz
      secretName: vridge-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: null
  maxUnavailable: 1

probes:
  startup:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 30
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

secrets:
  db:
    name: vridge-db-app
  app:
    name: vridge-env

migrations:
  enabled: true

seed:
  enabled: true
  scope: prod_v0_1_demo
